<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--dim:#8b949e;
--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--bar-bg:#21262d}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
background:var(--bg);color:var(--text);line-height:1.5;padding:16px;max-width:1400px;margin:0 auto}
.mono{font-family:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace}
header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;
padding:12px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
header h1{font-size:1.4rem;font-weight:600}
header .updated{color:var(--dim);font-size:.85rem}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;text-align:center}
.stat-card .label{font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:1.5rem;font-weight:700}
.stat-card .value.mono{font-variant-numeric:tabular-nums}
section{background:var(--surface);border:1px solid var(--border);border-radius:8px;
padding:16px;margin-bottom:20px}
section h2{font-size:1rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{text-align:left;color:var(--dim);font-weight:500;font-size:.75rem;text-transform:uppercase;
letter-spacing:.5px;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover{background:#1c2128}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.tag-long{background:rgba(63,185,80,.15);color:var(--green)}
.tag-short{background:rgba(248,81,73,.15);color:var(--red)}
.tag-flat{background:rgba(139,148,158,.15);color:var(--dim)}
.tag-buy{background:rgba(63,185,80,.15);color:var(--green)}
.tag-sell{background:rgba(248,81,73,.15);color:var(--red)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar-track{flex:1;height:8px;background:var(--bar-bg);border-radius:4px;overflow:hidden;max-width:200px}
.bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-label{min-width:50px;text-align:right}
.alert-banner{padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:.875rem;display:flex;align-items:flex-start;gap:10px}
.alert-banner.warn{background:rgba(210,153,34,.12);border:1px solid rgba(210,153,34,.4);color:var(--yellow)}
.alert-banner.ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.alert-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.alert-messages{list-style:none}
.alert-messages li{padding:2px 0}
.signal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:16px}
.signal-group h3{font-size:.85rem;font-weight:600;color:var(--blue);margin-bottom:8px}
.loading{color:var(--dim);font-style:italic;padding:20px;text-align:center}
.empty{color:var(--dim);text-align:center;padding:24px;font-size:.9rem}
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .signal-grid{grid-template-columns:1fr}
  table{font-size:.8rem}
  th,td{padding:6px 6px}
  .bar-track{max-width:100px}
  header{flex-direction:column;gap:4px}
}
</style>
</head>
<body>

<header>
  <h1>Strategy Dashboard</h1>
  <div style="display:flex;align-items:baseline;gap:16px">
    <a href="uncapped.html" style="color:var(--blue);font-size:.85rem;text-decoration:none">View Uncapped &rarr;</a>
    <span class="updated" id="last-updated">Loading...</span>
  </div>
</header>

<div id="risk-alerts"><div class="loading">Loading risk data...</div></div>

<div class="stats-row" id="stats-row">
  <div class="stat-card"><div class="label">Gross Leverage</div><div class="value mono" id="s-gross">--</div></div>
  <div class="stat-card"><div class="label">Net Exposure</div><div class="value mono" id="s-net">--</div></div>
  <div class="stat-card"><div class="label">Longs</div><div class="value mono" id="s-longs" style="color:var(--green)">--</div></div>
  <div class="stat-card"><div class="label">Shorts</div><div class="value mono" id="s-shorts" style="color:var(--red)">--</div></div>
  <div class="stat-card"><div class="label">Flat</div><div class="value mono" id="s-flat" style="color:var(--dim)">--</div></div>
</div>

<section id="positions-section">
  <h2>Portfolio Positions</h2>
  <div class="loading">Loading positions...</div>
</section>

<section id="signals-section">
  <h2>Strategy Signals</h2>
  <div class="loading">Loading signals...</div>
</section>


<script>
const $ = id => document.getElementById(id);

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function pct(v) { return (parseFloat(v) * 100).toFixed(2) + '%'; }
function dollar(v) { const n = parseFloat(v); return isNaN(n) ? '--' : '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function actionClass(a) {
  const u = (a || '').toUpperCase();
  if (u === 'LONG' || u === 'BUY') return 'long';
  if (u === 'SHORT' || u === 'SELL_SHORT' || u === 'SELL') return 'short';
  return 'flat';
}

function renderPositions(rows) {
  const sec = $('positions-section');
  if (!rows.length) { sec.innerHTML = '<h2>Portfolio Positions</h2><div class="empty">No position data available</div>'; return; }

  const lastDate = rows.reduce((m, r) => r.date > m ? r.date : m, '');
  rows = rows.filter(r => r.date === lastDate);
  rows.sort((a, b) => Math.abs(parseFloat(b.target_weight)||0) - Math.abs(parseFloat(a.target_weight)||0));
  const maxW = Math.max(...rows.map(r => Math.abs(parseFloat(r.target_weight)||0)), 0.01);
  $('last-updated').textContent = 'Data as of ' + lastDate;

  let longs = 0, shorts = 0, flats = 0, gross = 0, net = 0;
  rows.forEach(r => {
    const w = parseFloat(r.target_weight) || 0;
    const cls = actionClass(r.current_action);
    if (cls === 'long') longs++;
    else if (cls === 'short') shorts++;
    else flats++;
    gross += Math.abs(w);
    net += w;
  });
  $('s-gross').textContent = (gross * 100).toFixed(1) + '%';
  $('s-net').textContent = (net * 100).toFixed(1) + '%';
  $('s-longs').textContent = longs;
  $('s-shorts').textContent = shorts;
  $('s-flat').textContent = flats;

  const color = cls => cls === 'long' ? 'var(--green)' : cls === 'short' ? 'var(--red)' : 'var(--dim)';
  let html = '<h2>Portfolio Positions</h2><div style="overflow-x:auto"><table><thead><tr><th>Ticker</th><th>Target Weight</th><th>Action</th><th>Weight</th></tr></thead><tbody>';
  rows.forEach(r => {
    const w = parseFloat(r.target_weight) || 0;
    const cls = actionClass(r.current_action);
    const barW = (Math.abs(w) / maxW * 100).toFixed(1);
    html += `<tr>
      <td class="mono" style="font-weight:600">${r.ticker}</td>
      <td class="mono">${pct(r.target_weight)}</td>
      <td><span class="tag tag-${cls}">${(r.current_action||'FLAT').toUpperCase()}</span></td>
      <td><div class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${color(cls)}"></div></div></div></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  sec.innerHTML = html;
}

function renderSignals(rows) {
  const sec = $('signals-section');
  if (!rows.length) { sec.innerHTML = '<h2>Strategy Signals</h2><div class="empty">No signal data available</div>'; return; }

  const latestDate = rows.reduce((m, r) => r.date > m ? r.date : m, '');
  const latest = rows.filter(r => r.date === latestDate);
  const grouped = {};
  latest.forEach(r => { (grouped[r.strategy] = grouped[r.strategy] || []).push(r); });

  let html = '<h2>Strategy Signals <span style="color:var(--dim);font-size:.8rem;font-weight:400">(' + latestDate + ')</span></h2><div class="signal-grid">';
  Object.keys(grouped).sort().forEach(strat => {
    const srows = grouped[strat];
    srows.sort((a, b) => Math.abs(parseFloat(b.weight)||0) - Math.abs(parseFloat(a.weight)||0));
    html += '<div class="signal-group"><h3>' + strat + '</h3><table><thead><tr><th>Ticker</th><th>Signal</th><th>Weight</th></tr></thead><tbody>';
    srows.forEach(r => {
      const cls = actionClass(r.signal);
      html += `<tr><td class="mono" style="font-weight:600">${r.ticker}</td>
        <td><span class="tag tag-${cls}">${(r.signal||'').toUpperCase()}</span></td>
        <td class="mono">${pct(r.weight)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';
  sec.innerHTML = html;
}

function renderExecution(orders) {
  const sec = $('execution-section');
  if (!orders || !orders.length) { sec.innerHTML = '<h2>Execution Plan</h2><div class="empty">No pending orders</div>'; return; }

  let html = '<h2>Execution Plan</h2><div style="overflow-x:auto"><table><thead><tr><th>Ticker</th><th>Action</th><th>Target Wt</th><th>Est. Notional</th><th>Price</th><th>Reason</th></tr></thead><tbody>';
  orders.forEach(o => {
    const act = (o.action || o.side || '').toUpperCase();
    const cls = (act.includes('BUY') || act === 'LONG') ? 'buy' : (act.includes('SELL') || act.includes('SHORT')) ? 'sell' : 'flat';
    html += `<tr>
      <td class="mono" style="font-weight:600">${o.ticker || o.symbol || '--'}</td>
      <td><span class="tag tag-${cls}">${act}</span></td>
      <td class="mono">${o.target_weight != null ? pct(o.target_weight) : '--'}</td>
      <td class="mono">${o.notional != null ? dollar(o.notional) : o.estimated_notional != null ? dollar(o.estimated_notional) : '--'}</td>
      <td class="mono">${o.price != null ? dollar(o.price) : '--'}</td>
      <td style="color:var(--dim);max-width:260px">${o.reason || '--'}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  sec.innerHTML = html;
}

function renderRisk(messages) {
  const el = $('risk-alerts');
  if (!messages || !messages.length) {
    el.innerHTML = '<div class="alert-banner ok"><span class="alert-icon">&#10003;</span> No risk alerts</div>';
    return;
  }
  let html = '<div class="alert-banner warn"><span class="alert-icon">&#9888;</span><ul class="alert-messages">';
  messages.forEach(m => html += '<li>' + m + '</li>');
  html += '</ul></div>';
  el.innerHTML = html;
}

async function loadCSV(path) {
  try { const r = await fetch(path); if (!r.ok) throw 0; return parseCSV(await r.text()); }
  catch { return []; }
}

async function loadJSON(path) {
  try { const r = await fetch(path); if (!r.ok) throw 0; return await r.json(); }
  catch { return null; }
}

async function init() {
  const manifest = await loadJSON('data/latest_date.json');
  const date = manifest?.latest_date;
  if (!date) {
    $('last-updated').textContent = 'No data loaded';
    return;
  }

  const [positions, signals, state] = await Promise.all([
    loadCSV(`data/portfolio_positions_${date}.csv`),
    loadCSV(`data/daily_signals_${date}.csv`),
    loadJSON('data/positions_state.json')
  ]);

  renderPositions(positions);
  renderSignals(signals);

  const meta = state?.metadata || state || {};
  renderRisk(meta.last_risk_messages || state?.last_risk_messages || []);

  if (!positions.length) $('last-updated').textContent = 'No data loaded';
}

init();
</script>
</body>
</html>
